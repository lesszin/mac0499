<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC0499</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        body { 
            background-color: #f4f6f9; 
        }
        
        .main-container {
            max-width: 900px;
        }

        .nav-tabs .nav-link { 
            cursor: pointer; 
            color: #495057; 
            font-size: 1.1rem; 
            border: none; 
            padding: 12px 20px;
        }
        
        .nav-tabs .nav-link:hover { 
            color: #0d6efd; 
            background-color: transparent;
        }
        
        .nav-tabs .nav-link.active { 
            color: #0d6efd; 
            font-weight: bold; 
            border-bottom: 3px solid #0d6efd; 
            background-color: transparent;
        }

        .tab-hidden {
            display: none;
        }

        .large-icon {
            font-size: 2.5rem;
        }
    </style>
</head>
<body>
    <div class="container mt-4 mb-5 main-container">
        
        <a href="/" class="btn btn-outline-secondary btn-sm mb-4">
            <i class="bi bi-arrow-left"></i> Voltar para o Mapa
        </a>

        <div class="card shadow-sm border-0 mb-4 rounded-3">
            <div class="card-body p-4">
                <h3 id="schoolName" class="text-primary mb-2 fw-bold">Carregando</h3>
                <p id="schoolAddress" class="text-muted mb-0">
                    <span class="spinner-border spinner-border-sm" role="status"></span> Buscando localização
                </p>
            </div>
        </div>

        <ul class="nav nav-tabs mb-4 border-bottom-0">
            <li class="nav-item">
                <a class="nav-link active" id="btnSheet" onclick="switchTab('sheet')">Ficha</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="btnEvolution" onclick="switchTab('evolution')">Evolução</a>
            </li>
        </ul>

        <div id="contentSheet">
            <div id="dataSheet">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>

        <div id="contentEvolution" class="tab-hidden">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-5 text-center text-muted">
                    <i class="bi bi-bar-chart-line large-icon"></i>
                    <p class="mt-3">A integração com os gráficos do Metabase será exibida aqui.</p>
                </div>
            </div>
        </div>

    </div> 
    
    <script>
        const SCHOOL_CODE = Number("{{ codigo }}");
    </script>
    <script src="/static/js/details.js"></script>
</body>
</html>
