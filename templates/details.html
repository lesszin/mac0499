<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC0499</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #f4f6f9; }
        .nav-tabs .nav-link { cursor: pointer; color: #495057; font-size: 1.1rem; border: none; padding: 12px 20px;}
        .nav-tabs .nav-link:hover { color: #0d6efd; background-color: transparent;}
        .nav-tabs .nav-link.active { color: #0d6efd; font-weight: bold; border-bottom: 3px solid #0d6efd; background-color: transparent;}
    </style>
</head>
<body>
    <div class="container mt-4 mb-5" style="max-width: 900px;">
        
        <a href="/" class="btn btn-outline-secondary btn-sm mb-4">
            <i class="bi bi-arrow-left"></i> Voltar para o Mapa
        </a>

        <div class="card shadow-sm border-0 mb-4 rounded-3">
            <div class="card-body p-4">
                <h3 id="nome-escola" class="text-primary mb-2 fw-bold">Carregando</h3>
                <p id="endereco-escola" class="text-muted mb-0">
                    <span class="spinner-border spinner-border-sm" role="status"></span> Buscando localização
                </p>
            </div>
        </div>

        <ul class="nav nav-tabs mb-4 border-bottom-0">
            <li class="nav-item">
                <a class="nav-link active" id="btn-ficha" onclick="alternarAba('ficha')">Ficha</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="btn-evolucao" onclick="alternarAba('evolucao')">Evolução</a>
            </li>
        </ul>

        <div id="conteudo-ficha">
            <div id="dados-ficha">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>

        <div id="conteudo-evolucao" style="display: none;">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-5 text-center text-muted">
                    <i class="bi bi-bar-chart-line" style="font-size: 2.5rem;"></i>
                    <p class="mt-3">A integração com os gráficos do Metabase será exibida aqui.</p>
                </div>
            </div>
        </div>

    </div> <script>
        const ESCOLA_CODIGO = Number("{{ codigo }}");
    </script>
    <script src="/static/js/details.js"></script>
</body>
</html>
