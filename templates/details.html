<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC0499</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="/static/css/details.css">
</head>
<body>
    <div class="container mt-4 mb-5 main-container">
        
        <a href="/" class="btn btn-outline-secondary btn-sm mb-4">
            <i class="bi bi-arrow-left"></i> Voltar para o Mapa
        </a>

        <div class="card shadow-sm border-0 mb-4 rounded-3">
            <div class="card-body p-4">
                <h3 id="schoolName" class="text-primary mb-2 fw-bold">Carregando</h3>
                <p id="schoolAddress" class="text-muted mb-0">
                    <span class="spinner-border spinner-border-sm" role="status"></span> Buscando localização
                </p>
            </div>
        </div>

        <ul class="nav nav-tabs mb-4 border-bottom-0">
            <li class="nav-item">
                <a class="nav-link active" id="btnSheet" onclick="switchTab('sheet')">Ficha</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="btnEvolution" onclick="switchTab('evolution')">Evolução</a>
            </li>
        </ul>

        <div id="contentSheet">
            <div id="dataSheet">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>

        <div id="contentEvolution" class="tab-hidden">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-3 text-center">
                    <div id="evolutionLoader" class="py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="text-muted mt-2">Carregando painel de evolução...</p>
                    </div>
                    <iframe id="metabasePlayer" class="w-100 d-none" height="600" allowtransparency></iframe>
                </div>
            </div>
        </div>

    </div> 
    
    <script>
        const SCHOOL_CODE = Number("{{ codigo }}");
    </script>
    <script src="/static/js/details.js?v=1"></script>
</body>
</html>
