<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC0499 - Evolução Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    
    <style>
        #iframe-metabase { width: 100%; height: 800px; border: none; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        /* Centralizamos o mapa aqui */
        #mapa-brasil { width: 100%; height: 60vh; min-height: 400px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; z-index: 1;}
        
        /* Estilos básicos para as abas */
        .btn-aba { padding: 10px 20px; cursor: pointer; background: #eee; border: none; border-radius: 5px 5px 0 0; margin-right: 5px; transition: background 0.3s; }
        .btn-aba:hover { background: #ddd; }
        .btn-aba.active { background: #0d6efd; color: white; } /* Cor azul do Bootstrap para a aba ativa */
    </style>
</head>
<body class="bg-light pb-5">
    <div class="container mt-4">
        <div class="row mb-3">
            <div class="col-12 text-center">
                <h1 class="display-5 text-primary fw-bold">Evolução Escolar</h1>
                <p class="text-muted">Navegue pelo mapa ou pesquise para analisar os dados.</p>
            </div>
        </div>
        
        <div class="row justify-content-center mb-4">
            <div class="col-md-8 position-relative">
                <div class="input-group shadow-sm">
                    <input type="text" id="escolaInput" class="form-control form-control-lg" placeholder="Pesquise pelo nome da escola..." autocomplete="off">
                </div>
                <div id="caixaSugestoes" class="list-group position-absolute w-100 shadow mt-1 d-none" style="z-index: 1000; max-height: 250px; overflow-y: auto;"></div>
            </div>
        </div>

        <div class="row justify-content-center mb-4">
            <div class="col-12 position-relative">
                
                <div id="mapa-brasil"></div>
                
                <div class="bg-white p-3 rounded shadow border" style="position: absolute; top: 15px; right: 25px; z-index: 1000; width: 240px; font-size: 0.85rem;">
                    <p class="mb-2 fw-bold text-primary border-bottom pb-1">Modalidades</p>
                    
                    <div class="d-flex flex-column gap-1">
                        <div class="form-check">
                            <input class="form-check-input filtro-modalidade" type="checkbox" value="creche" id="chk-creche">
                            <label class="form-check-label text-dark" for="chk-creche">Creche</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input filtro-modalidade" type="checkbox" value="pre_escola" id="chk-pre">
                            <label class="form-check-label text-dark" for="chk-pre">Pré-escola</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input filtro-modalidade" type="checkbox" value="fund_ai" id="chk-fai">
                            <label class="form-check-label text-dark" for="chk-fai">Ensino Fundamental Iniciais</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input filtro-modalidade" type="checkbox" value="fund_af" id="chk-faf">
                            <label class="form-check-label text-dark" for="chk-faf">Ensino Fundamental Finais</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input filtro-modalidade" type="checkbox" value="medio" id="chk-med">
                            <label class="form-check-label text-dark" for="chk-med">Ensino Médio</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input filtro-modalidade" type="checkbox" value="medio_int" id="chk-med-int">
                            <label class="form-check-label text-dark" for="chk-med-int">Ensino Medio Integrado</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input filtro-modalidade" type="checkbox" value="tecnico" id="chk-tec">
                            <label class="form-check-label text-dark" for="chk-tec">Ensino Profissionalizante</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input filtro-modalidade" type="checkbox" value="eja_fund" id="chk-eja-f">
                            <label class="form-check-label text-dark" for="chk-eja-f">Ensino EJA Fund.</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input filtro-modalidade" type="checkbox" value="eja_med" id="chk-eja-m">
                            <label class="form-check-label text-dark" for="chk-eja-m">Ensino EJA Médio</label>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div id="painel-escola" class="shadow-sm rounded" style="display: none; padding: 20px; background: #fff; border-top: 4px solid #0d6efd;">
            
            <h2 id="txt-nome-escola" class="mb-1 text-dark">Nome da Escola</h2>
            <p id="txt-endereco-escola" class="text-muted mb-4 fs-6">Carregando localização...</p>
            
            <div class="abas" style="margin-bottom: 20px; border-bottom: 2px solid #dee2e6;">
                <button id="btn-ficha" class="btn-aba active" onclick="alternarAba('ficha')">Ficha da Escola</button>
                <button id="btn-evolucao" class="btn-aba" onclick="alternarAba('evolucao')">Evolução Histórica</button>
            </div>

            <div id="conteudo-ficha" class="conteudo-aba">
                <h4 class="text-secondary">Dados Gerais (Censo Atual)</h4>
                <div id="dados-ficha" class="mt-3">
                    <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Carregando...</span></div>
                </div>
            </div>

            <div id="conteudo-evolucao" class="conteudo-aba" style="display: none;">
                <h4 class="text-secondary">Dashboard Metabase</h4>
                <div id="dados-evolucao" class="mt-3">
                    </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div id="mensagem-erro" class="col-12 text-danger text-center mt-3 d-none"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
