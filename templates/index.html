<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CulturaEduca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #iframe-metabase { width: 100%; height: 800px; border: none; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light pb-5">
    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col-12 text-center">
                <h1 class="display-5 text-primary fw-bold">Evolução Escolar</h1>
            </div>
        </div>
        
        <div class="row justify-content-center mb-5">
            <div class="col-md-6 position-relative">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <label for="escolaInput" class="form-label fw-bold">Pesquisar por Escola</label>
                        <div class="input-group">
                            <input type="text" id="escolaInput" class="form-control form-control-lg" placeholder="Digite o nome da escola..." autocomplete="off">
                            <button class="btn btn-primary btn-lg" disabled id="btnBuscar">Analisar</button>
                        </div>
                        <div id="caixaSugestoes" class="list-group position-absolute w-100 shadow mt-1 d-none" style="z-index: 1000; max-height: 250px; overflow-y: auto;"></div>
                        <div id="mensagem-erro" class="text-danger mt-2 d-none"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-12" id="area-painel">
                <div class="text-center text-muted" id="texto-espera">
                    <p>Pesquise uma escola acima para carregar os dados.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
