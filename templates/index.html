<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC0499</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .main-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #mapContainer {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1;
        }

        .search-widget {
            position: absolute;
            top: 15px;
            left: 20px;
            z-index: 1000;
            width: 360px;
            max-width: 90vw;
        }

        #searchSuggestions {
            top: 100%;
            left: 0;
            z-index: 1100;
            max-height: 300px;
            overflow-y: auto;
        }

        .filters-widget {
            position: absolute;
            top: 15px;
            right: 25px;
            z-index: 1000;
            width: 240px;
            font-size: 0.85rem;
        }

        .filter-header-cursor {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div id="mapContainer"></div>

        <div class="search-widget">
            <div class="card shadow border-0">
                <div class="card-body p-2">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-0 text-primary">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text" id="schoolInput" class="form-control border-0 shadow-none" placeholder="Digite o nome da escola" autocomplete="off">
                    </div>
                    <div id="searchSuggestions" class="list-group position-absolute w-100 shadow d-none bg-white"></div>
                </div>
            </div>
        </div>

        <div class="card shadow border-0 bg-white filters-widget">
            <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center py-2 filter-header-cursor" data-bs-toggle="collapse" data-bs-target="#filtersBody" aria-expanded="true">
                <span class="fw-bold text-primary mb-0">Educação</span>
                <i class="bi bi-chevron-down text-primary small"></i>
            </div>
            
            <div id="filtersBody" class="collapse show">
                <div class="card-body pt-0 pb-3">
                    <div class="d-flex flex-column gap-1">
                        <div class="form-check">
                            <input class="form-check-input modality-filter" type="checkbox" value="creche" id="chk-daycare">
                            <label class="form-check-label text-dark" for="chk-daycare">Creche</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input modality-filter" type="checkbox" value="pre_escola" id="chk-preschool">
                            <label class="form-check-label text-dark" for="chk-preschool">Pré-escola</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input modality-filter" type="checkbox" value="fund_ai" id="chk-elem-early">
                            <label class="form-check-label text-dark" for="chk-elem-early">Ensino Fundamental Iniciais</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input modality-filter" type="checkbox" value="fund_af" id="chk-elem-late">
                            <label class="form-check-label text-dark" for="chk-elem-late">Ensino Fundamental Finais</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input modality-filter" type="checkbox" value="medio" id="chk-high">
                            <label class="form-check-label text-dark" for="chk-high">Ensino Médio</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input modality-filter" type="checkbox" value="medio_int" id="chk-high-int">
                            <label class="form-check-label text-dark" for="chk-high-int">Ensino Medio Integrado</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input modality-filter" type="checkbox" value="tecnico" id="chk-tech">
                            <label class="form-check-label text-dark" for="chk-tech">Ensino Profissionalizante</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input modality-filter" type="checkbox" value="eja_fund" id="chk-eja-elem">
                            <label class="form-check-label text-dark" for="chk-eja-elem">Ensino EJA Fund.</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input modality-filter" type="checkbox" value="eja_med" id="chk-eja-high">
                            <label class="form-check-label text-dark" for="chk-eja-high">Ensino EJA Médio</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    
    <script src="/static/js/main.js"></script>
</body>
</html>
